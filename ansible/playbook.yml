---
# Main playbook that provisions the AI Lab stack.
- name: Setup AI Lab
  # Target inventory group to configure.
  hosts: ai_lab
  # Run tasks with elevated privileges where required.
  become: yes
  # Gather host facts used by role logic and templates.
  gather_facts: yes

  # Preflight tasks run before role execution.
  pre_tasks:
    # Validate that privilege escalation works and sudo password can be provided.
    - name: Validate sudo/become access
      command: whoami
      become: yes
      register: become_check
      changed_when: false
      failed_when: become_check.stdout != 'root'

    # Print current target context for easier troubleshooting.
    - name: Display target context
      debug:
        msg:
          - "app_user={{ app_user }}"
          - "app_home={{ app_home }}"
          - "app_dir={{ app_dir }}"
          - "backend_manage_repo={{ backend_manage_repo | default(true) }}"

  # Role execution order matters for dependencies (base -> services -> app).
  roles:
    # Installs base packages, repositories, and Node.js runtime.
    - role: base
      # Allows targeting this role with --tags base.
      tags: ['base']

    # Installs and configures Ollama before UI/backend consumers.
    - role: ollama
      # Allows targeting this role with --tags ollama.
      tags: ['ollama']
      # Optional role toggle for selective runs.
      when: run_ollama | default(true)

    # Installs Docker and starts containerized services.
    - role: docker
      # Allows targeting this role with --tags docker.
      tags: ['docker']
      # Optional role toggle for selective runs.
      when: run_docker | default(true)

    # Deploys backend code, dependencies, and systemd unit.
    - role: backend
      # Allows targeting this role with --tags backend.
      tags: ['backend']
      # Optional role toggle for selective runs.
      when: run_backend | default(true)

    # Writes SSH alias configuration for convenience access.
    - role: ssh
      # Allows targeting this role with --tags ssh.
      tags: ['ssh']
      # Optional role toggle for selective runs.
      when: run_ssh | default(true)

  # Final informational output shown at the end of a successful run.
  post_tasks:
    # Print service endpoints and useful follow-up commands.
    - name: Display access information
      debug:
        msg: |
          ========================================
          AI Lab Setup Complete!
          ========================================

          Services:
          - Ollama:     http://localhost:11434
          - OpenWebUI: http://localhost:8080
          - Qdrant:    http://localhost:6333
          - Backend:   http://localhost:3000

          Useful commands:
          - ~/health.sh         # Health check
          - ~/logs.sh           # View logs
          - systemctl status ollama
          - systemctl status ai-backend

          To pull models manually:
          - ollama pull gemma4:e2b
          - ollama pull gemma4:e4b
          - ollama pull gemma4:26b
          ========================================
