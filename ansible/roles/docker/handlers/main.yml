---
# Ensure Docker daemon is started and enabled.
- name: Start Docker
  systemd:
    name: docker
    enabled: yes
    state: started
  become: yes

# Restart Docker daemon after impactful config changes.
- name: Restart Docker
  systemd:
    name: docker
    state: restarted
  become: yes

# Reload Docker daemon when a reload is sufficient.
- name: Reload Docker
  systemd:
    name: docker
    state: reloaded
  become: yes
