---
# Refresh apt metadata before package and repository operations.
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

# Normalize architecture name for apt repository declarations.
- name: Set Debian architecture for repositories
  set_fact:
    deb_arch: "{{ apt_arch_map[ansible_architecture] | default(ansible_architecture) }}"

# Install core OS packages and Python Docker bindings.
- name: Install base dependencies
  apt:
    name:
      - curl
      - unzip
      - git
      - python3
      - python3-pip
      - python3-venv
      - software-properties-common
      - ca-certificates
      - gnupg
      - lsb-release
      - python3-docker
    state: present
  become: yes

# Ensure modern apt keyring directory exists.
- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: yes

# Download Docker repository signing key.
- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  become: yes

# Download NodeSource repository signing key.
- name: Download NodeSource GPG key
  get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: '0644'
  become: yes

# Register Docker apt repository for Docker CE packages.
- name: Add Docker repository
  apt_repository:
    repo: "deb [arch={{ deb_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release | lower }} stable"
    state: present
  become: yes

# Register NodeSource apt repository for Node.js 22 LTS.
- name: Add NodeSource Node.js 22.x repository
  apt_repository:
    repo: "deb [arch={{ deb_arch }} signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_22.x nodistro main"
    state: present
  become: yes

# Refresh apt metadata after adding external repositories.
- name: Update apt cache again
  apt:
    update_cache: yes
  become: yes

# Install Node.js runtime for backend service.
- name: Install Node.js 22.x
  apt:
    name:
      - nodejs
    state: present
  become: yes

# Ensure application user exists for ownership and service execution.
- name: Ensure app user exists
  user:
    name: "{{ app_user }}"
    comment: "AI Lab Backend User"
    shell: /bin/bash
    create_home: yes
  become: yes

# Ensure application home directory exists with correct ownership.
- name: Create app home directory
  file:
    path: "{{ app_home }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  become: yes

# Ensure application directory exists with correct ownership.
- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'
  become: yes
