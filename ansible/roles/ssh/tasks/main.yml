---
# Ensure ~/.ssh directory exists with secure permissions.
- name: Create .ssh directory
  file:
    path: "{{ app_home }}/.ssh"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0700'
  become: yes

# Render SSH alias configuration file from template.
- name: Copy SSH config
  template:
    src: ssh_config.j2
    dest: "{{ app_home }}/.ssh/config"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'
  become: yes
