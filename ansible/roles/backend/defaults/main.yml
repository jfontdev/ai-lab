---
# Default application owner user derived from inventory login user.
app_user: "{{ ansible_user | default(ansible_user_id) }}"
# Default home directory for application owner user.
app_home: "{{ ansible_user_dir | default('/home/' ~ app_user) }}"
# Default application deployment directory.
app_dir: "{{ app_home }}/ai-stack"
# Default backend model sent to Ollama unless overridden.
ollama_model: gemma4:e4b
# Backend repository URL (public HTTPS).
app_repo_url: https://github.com/jfontdev/ai-lab.git
# Backend repository version/branch to deploy.
app_repo_version: main
# Toggle whether backend role manages git checkout/update.
backend_manage_repo: true
